<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎧 Mood Music App 🎧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
  if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

<button onclick="logout()" class="logout-btn">Logout</button>

<div class="container">
  <h1>🎧 Tamizh Mooood Music 🎧</h1>

  <div class="moods">
    <button onclick="getMusic('happy', this)">Happy Songs</button>
    <button onclick="getMusic('sad', this)">Sad Songs</button>
    <button onclick="getMusic('relax', this)">Relax Songs</button>
    <button onclick="getMusic('energy', this)">Energy Songs</button>
  </div>

  <div id="songs" class="songs"></div>
</div>

<script src="app.js"></script>
</body>
</html>
